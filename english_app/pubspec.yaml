name: english_app
description: Ứng dụng học tiếng Anh
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  cupertino_icons: 1.0.9
  firebase_core: 4.11.0
  firebase_auth: 6.5.4
  cloud_firestore: 6.6.0
  firebase_storage: 13.4.3
  google_generative_ai: 0.4.7
  http: 1.6.0
  shared_preferences: 2.2.3
  flutter_local_notifications: 18.0.1
  timezone: 0.9.4
  url_launcher: 6.3.1
  image_picker: 1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/firebase_seed/firestore_data.json
